name: Flutter CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Install dependencies
        working-directory: medical_assistant_app
        run: flutter pub get

      - name: Analyze code
        working-directory: medical_assistant_app
        run: flutter analyze

      - name: Run tests
        working-directory: medical_assistant_app
        run: flutter test
